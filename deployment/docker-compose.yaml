name: banking-system

services:

  postgres:
    image: postgres:18
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5433:5432"
    env_file:
      - .env.db

volumes:
  postgres-data: